spring.application.name=ExamPractice

# PDF rendering
pdf.render.dpi=300

# Tesseract OCR configuration
# Path to Tesseract's language data files (NOT the PDF file path)
# The PDF file comes from the request parameter in the controller
ocr.tessdata.path=/opt/homebrew/Cellar/tesseract/5.5.2/share/tessdata
ocr.library.path=/opt/homebrew/lib
ocr.language=eng+equ
ocr.psm=6
ocr.oem=1
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# LLM question extraction
# Set to `gemini` when you have a Gemini API key configured.
llm.provider=gemini

gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-1.5-flash
llm.maxChars=120000
llm.temperature=0.2
llm.chunkPages=8
