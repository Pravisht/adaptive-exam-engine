spring.application.name=ExamPractice

# PDF rendering
pdf.render.dpi=300

# Tesseract OCR configuration
# Path to the tessdata directory (folder containing *.traineddata).
# Prefer Homebrew's current symlink (stays valid after `brew upgrade tesseract`):
#   $(brew --prefix tesseract)/share/tessdata  ->  often /opt/homebrew/opt/tesseract/share/tessdata
# Check CLI version: tesseract --version
# Upgrade Tesseract: brew update && brew upgrade tesseract
ocr.tessdata.path=/opt/homebrew/opt/tesseract/share/tessdata
ocr.library.path=/opt/homebrew/lib
# eng+equ improves math/symbols (roots, equations). Homebrew does not ship equ.traineddata — add it once:
#   curl -fsSL -o "$(brew --prefix tesseract)/share/tessdata/equ.traineddata" \
#     https://github.com/tesseract-ocr/tessdata/raw/main/equ.traineddata
# Or set ocr.tessdata.path to a folder where you placed equ.traineddata next to eng.traineddata.
ocr.language=eng+equ
ocr.psm=6
# 1=LSTM-only — fails with `equ` (equation data is legacy, no LSTM). Use 3=default.
ocr.oem=3
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# LLM question extraction
# Set to `gemini` when you have a Gemini API key configured.
llm.provider=gemini

gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-1.5-flash
llm.maxChars=120000
llm.temperature=0.2
llm.chunkPages=8
